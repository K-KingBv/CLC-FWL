<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Calculadora de Atributos + Ficha con Radar Etiquetado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,140,0.3);
        }

        h1 {
            font-size: clamp(1.5rem, 6vw, 2rem);
            text-align: center;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            text-align: center;
            color: #bcd0e0;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .points-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 2rem;
            padding: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .total-box, .remaining {
            background: #00000066;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            text-align: center;
        }
        .total-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #FFD966;
        }
        .warning {
            font-size: 0.7rem;
            background: #2c1e0e80;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            text-align: center;
        }
        .progress-container {
            background: #2c3e2e4d;
            border-radius: 2rem;
            height: 8px;
            margin-bottom: 1rem;
        }
        .progress-bar {
            background: linear-gradient(90deg, #f3b33d, #ffdd77);
            width: 0%;
            height: 100%;
            border-radius: 2rem;
        }
        .attributes-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .attr-card {
            background: rgba(15,25,35,0.85);
            border-radius: 1.5rem;
            padding: 0.7rem;
        }
        .attr-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }
        .attr-name {
            font-weight: bold;
            font-size: 1rem;
            color: #ffdfaa;
        }
        .attr-limits {
            font-size: 0.7rem;
            background: #00000055;
            padding: 0.1rem 0.5rem;
            border-radius: 2rem;
            color: #bbd4ff;
        }
        .value-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.3rem 0;
        }
        .slider {
            flex: 2;
            min-width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: #2d3e4e;
            border-radius: 10px;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #ffb347;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px #ffae42;
            border: 2px solid white;
        }
        .stat-value-calc {
            background: #0f1a1f;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #f5bc70;
        }
        .number-input input {
            background: #09161e;
            border: 1px solid #ffb34788;
            color: #ffdd99;
            border-radius: 2rem;
            padding: 0.3rem 0.6rem;
            width: 65px;
            text-align: center;
        }
        .cost-info {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.7rem;
            color: #aac8e6;
        }
        .points-cost {
            background: #00000060;
            padding: 0.1rem 0.5rem;
            border-radius: 2rem;
        }
        button {
            background: #ffb347;
            border: none;
            font-weight: bold;
            padding: 0.6rem;
            border-radius: 3rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 #a05e15;
            transform: translateY(-2px);
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .role-group, .button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .role-btn {
            background: #3a6ea5;
            box-shadow: 0 3px 0 #1e3a5f;
            color: white;
        }
        .download-btn {
            background: #2c6e2c;
            box-shadow: 0 3px 0 #1a451a;
            color: white;
            width: 100%;
            margin-top: 0.8rem;
            font-size: 1.1rem;
        }
        .char-info {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .input-group label {
            font-size: 0.8rem;
            color: #ffdfaa;
            font-weight: bold;
        }
        .input-group input, .input-group textarea {
            background: #0f1a1f;
            border: 1px solid #ffb34788;
            color: #ffdd99;
            border-radius: 1.5rem;
            padding: 0.5rem 1rem;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .skills-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .skill-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .skill-num {
            background: #ffb347;
            color: #1e2a32;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .skill-input {
            flex: 1;
        }
        .file-label {
            background: #3a6ea5;
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            text-align: center;
            color: white;
            font-size: 0.8rem;
        }
        input[type="file"] {
            display: none;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            color: #6e8eae;
            margin-top: 1rem;
        }
        @media (max-width: 550px) {
            body { padding: 10px; }
            .container { padding: 1rem; }
            .value-row { flex-direction: column; align-items: stretch; }
            .slider { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚔️ FORJADOR DE HÉROES ⚔️</h1>
    <div class="sub">Distribuye 200 puntos (mínimo 1)</div>

    <div class="points-panel">
        <div class="total-box"><div class="total-label">PUNTOS TOTALES</div><div class="total-value" id="totalPointsDisplay">200</div></div>
        <div class="remaining"><div class="total-label">RESTANTES</div><div class="total-value" id="remainingPointsDisplay">200</div></div>
        <div class="warning" id="warningMsg">✨ Ajusta atributos</div>
    </div>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

    <div class="attributes-grid" id="attributesContainer"></div>

    <div class="button-group">
        <button id="resetBtn">♻️ MÍNIMOS (1)</button>
        <button id="randomBtn">🎲 ALEATORIO</button>
    </div>
    <div class="role-group">
        <button id="magoBtn" class="role-btn">🧙 MAGO</button>
        <button id="luchadorBtn" class="role-btn">⚔️ LUCHADOR</button>
        <button id="tanqueBtn" class="role-btn">🛡️ TANQUE</button>
        <button id="asesinoBtn" class="role-btn">🗡️ ASESINO</button>
    </div>

    <!-- Datos para la ficha -->
    <div class="char-info">
        <div class="input-group">
            <label>📝 Nombre del personaje</label>
            <input type="text" id="charName" placeholder="Ej: Thorgrim, Elara, etc." value="Aventurero">
        </div>
        <div class="input-group">
            <label>🖼️ Imagen del personaje (izquierda, tamaño original)</label>
            <label class="file-label" for="charImageInput">Seleccionar imagen</label>
            <input type="file" id="charImageInput" accept="image/jpeg, image/png, image/webp">
            <span id="imagePreviewName" style="font-size:0.7rem; color:#bbaa77;">Ninguna imagen seleccionada (icono por defecto)</span>
        </div>
        <div class="input-group">
            <label>✨ Habilidades (máximo 5)</label>
            <div class="skills-group" id="skillsContainer">
                <!-- Se generarán 5 campos dinámicamente -->
            </div>
        </div>
    </div>

    <button id="downloadBtn" class="download-btn">📸 DESCARGAR FICHA (radar etiquetado)</button>
    <footer>Vida (1:1) · Daño (5:1) · Armadura (10:1) · Pasos (10:1) · FP (1:1) · Alcance (10:1)</footer>
</div>

<script>
    // ---------- ATRIBUTOS Y LÓGICA ----------
    const attributes = [
        { id: "hp", name: "VIDA", maxValue: 80, costPerUnit: 1, minValue: 1, icon: "❤️" },
        { id: "dmg", name: "DAÑO", maxValue: 8, costPerUnit: 5, minValue: 1, icon: "⚔️" },
        { id: "armor", name: "ARMADURA", maxValue: 6, costPerUnit: 10, minValue: 1, icon: "🛡️" },
        { id: "steps", name: "PASOS", maxValue: 8, costPerUnit: 10, minValue: 1, icon: "👟" },
        { id: "fp", name: "FP", maxValue: 60, costPerUnit: 1, minValue: 1, icon: "✨" },
        { id: "range", name: "ALCANCE", maxValue: 8, costPerUnit: 10, minValue: 1, icon: "🏹" }
    ];

    let currentValues = {};
    attributes.forEach(attr => { currentValues[attr.id] = 1; });

    let selectedImageData = null;

    // Roles predefinidos
    const roles = {
        mago: { hp:20, dmg:5, armor:1, steps:2, fp:55, range:7 },
        luchador: { hp:45, dmg:7, armor:4, steps:5, fp:10, range:2 },
        tanque: { hp:75, dmg:2, armor:6, steps:4, fp:5, range:1 },
        asesino: { hp:15, dmg:8, armor:1, steps:8, fp:5, range:5 }
    };

    function applyRole(roleKey) {
        const r = roles[roleKey];
        if (r) {
            attributes.forEach(attr => { currentValues[attr.id] = r[attr.id]; });
            updateAllUI();
        }
    }

    function resetToMin() {
        attributes.forEach(attr => { currentValues[attr.id] = attr.minValue; });
        updateAllUI();
    }

    function randomDistribution() {
        resetToMin();
        let remainingPoints = 200 - calculateTotalPoints();
        let attempts = 0;
        while (remainingPoints > 0 && attempts < 2000) {
            let shuffled = [...attributes];
            for (let i = shuffled.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
            let changed = false;
            for (let attr of shuffled) {
                if (currentValues[attr.id] < attr.maxValue && remainingPoints >= attr.costPerUnit) {
                    currentValues[attr.id]++;
                    remainingPoints -= attr.costPerUnit;
                    changed = true;
                    break;
                }
            }
            if (!changed) break;
            attempts++;
        }
        if (remainingPoints > 0) {
            const cheap = attributes.filter(a => a.costPerUnit === 1 && currentValues[a.id] < a.maxValue);
            for (let a of cheap) {
                while (remainingPoints >= 1 && currentValues[a.id] < a.maxValue) {
                    currentValues[a.id]++;
                    remainingPoints--;
                }
                if (remainingPoints === 0) break;
            }
        }
        updateAllUI();
    }

    function calculateTotalPoints() {
        return attributes.reduce((sum, attr) => sum + currentValues[attr.id] * attr.costPerUnit, 0);
    }

    function setAttributeValue(attrId, newRawValue) {
        const attr = attributes.find(a => a.id === attrId);
        if (!attr) return;
        if (newRawValue < attr.minValue) {
            showTemporaryWarning(`⚠️ El mínimo para ${attr.name} es ${attr.minValue}.`);
            syncInputs();
            return;
        }
        let clampedValue = Math.min(attr.maxValue, newRawValue);
        const oldValue = currentValues[attrId];
        const oldTotal = calculateTotalPoints();
        let newTotal = oldTotal - (oldValue * attr.costPerUnit) + (clampedValue * attr.costPerUnit);
        let finalValue = clampedValue;
        if (newTotal > 200) {
            const excess = newTotal - 200;
            const maxReduction = Math.ceil(excess / attr.costPerUnit);
            let possible = clampedValue - maxReduction;
            if (possible < attr.minValue) possible = attr.minValue;
            if (oldTotal - (oldValue * attr.costPerUnit) + (possible * attr.costPerUnit) <= 200) finalValue = possible;
            else {
                let best = attr.minValue;
                for (let v = attr.minValue; v <= clampedValue; v++) {
                    if (oldTotal - (oldValue * attr.costPerUnit) + (v * attr.costPerUnit) <= 200) best = v;
                    else break;
                }
                finalValue = best;
            }
        }
        if (currentValues[attrId] !== finalValue) {
            currentValues[attrId] = finalValue;
            updateAllUI();
        } else {
            updateAllUI();
        }
    }

    function syncInputs() {
        attributes.forEach(attr => {
            const val = currentValues[attr.id];
            const slider = document.getElementById(`${attr.id}_slider`);
            if (slider && slider.value != val) slider.value = val;
            const num = document.getElementById(`${attr.id}_num`);
            if (num && num.value != val) num.value = val;
            const span = document.getElementById(`${attr.id}_value_display`);
            if (span) span.innerText = val;
            const costSpan = document.getElementById(`${attr.id}_cost`);
            if (costSpan) costSpan.innerText = `${val * attr.costPerUnit} pts`;
        });
    }

    function showTemporaryWarning(msg) {
        const warn = document.getElementById("warningMsg");
        warn.innerHTML = msg;
        warn.style.color = "#ffaa88";
        setTimeout(() => {
            const total = calculateTotalPoints();
            if (total === 200) warn.innerHTML = "✅ ¡PUNTOS JUSTOS!";
            else warn.innerHTML = `📌 Te quedan ${200 - total} puntos.`;
            warn.style.color = "#f1c40f";
        }, 2000);
    }

    function updateAllUI() {
        const total = calculateTotalPoints();
        const remaining = 200 - total;
        document.getElementById("totalPointsDisplay").innerText = total;
        document.getElementById("remainingPointsDisplay").innerText = remaining;
        document.getElementById("progressBar").style.width = `${Math.min(100, (total/200)*100)}%`;
        const warn = document.getElementById("warningMsg");
        if (total === 200) warn.innerHTML = "✅ ¡PUNTOS JUSTOS!";
        else warn.innerHTML = `📌 Te quedan ${remaining} puntos.`;
        syncInputs();
    }

    // Imagen
    const imageInput = document.getElementById("charImageInput");
    imageInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                selectedImageData = ev.target.result;
                document.getElementById("imagePreviewName").innerText = "✅ Imagen cargada (tamaño original)";
            };
            reader.readAsDataURL(file);
        } else {
            selectedImageData = null;
            document.getElementById("imagePreviewName").innerText = "Ninguna imagen seleccionada";
        }
    });

    // Crear campos de habilidades (5)
    function buildSkillsInputs() {
        const container = document.getElementById("skillsContainer");
        container.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
            const div = document.createElement("div");
            div.className = "skill-row";
            div.innerHTML = `
                <span class="skill-num">${i}</span>
                <input type="text" class="skill-input" id="skill_${i}" placeholder="Nombre de la habilidad ${i}" value="">
            `;
            container.appendChild(div);
        }
    }

    // Dibujar gráfico hexagonal con etiquetas y tamaño reducido para que quepan los emojis
    function drawRadarChart(ctx, width, height, values) {
        // Reducimos el radio del gráfico al 30% del tamaño mínimo (antes 40%) para dejar más espacio
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = Math.min(width, height) * 0.30; // más pequeño
        const angleStep = (Math.PI * 2) / 6;
        const angles = [];
        for (let i = 0; i < 6; i++) {
            angles.push(-Math.PI / 2 + i * angleStep); // empezar arriba
        }
        
        // Limpiar
        ctx.clearRect(0, 0, width, height);
        
        // Dibujar fondos (hexágonos de referencia)
        ctx.strokeStyle = "#c2a144";
        ctx.fillStyle = "rgba(210, 180, 140, 0.2)";
        ctx.lineWidth = 1;
        for (let level = 1; level <= 4; level++) {
            ctx.beginPath();
            const r = radius * (level / 4);
            for (let i = 0; i < 6; i++) {
                const x = centerX + r * Math.cos(angles[i]);
                const y = centerY + r * Math.sin(angles[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
        }
        
        // Dibujar líneas radiales
        for (let i = 0; i < 6; i++) {
            const x = centerX + radius * Math.cos(angles[i]);
            const y = centerY + radius * Math.sin(angles[i]);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
        
        // Dibujar el polígono de datos
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const r = radius * values[i];
            const x = centerX + r * Math.cos(angles[i]);
            const y = centerY + r * Math.sin(angles[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(255, 180, 70, 0.5)";
        ctx.fill();
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Dibujar pequeños círculos en los vértices
        ctx.fillStyle = "#ffb347";
        for (let i = 0; i < 6; i++) {
            const r = radius * values[i];
            const x = centerX + r * Math.cos(angles[i]);
            const y = centerY + r * Math.sin(angles[i]);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);
            ctx.fill();
        }
        
        // ETIQUETAS: emojis en los vértices exteriores (más allá del radio)
        const labels = ["❤️", "⚔️", "🛡️", "👟", "✨", "🏹"];
        const labelRadius = radius + 22; // distancia desde el centro
        ctx.font = "bold 18px 'Segoe UI Emoji'";
        ctx.fillStyle = "#3b2a1f";
        ctx.shadowBlur = 0;
        for (let i = 0; i < 6; i++) {
            const x = centerX + labelRadius * Math.cos(angles[i]);
            const y = centerY + labelRadius * Math.sin(angles[i]);
            ctx.fillText(labels[i], x - 12, y + 7);
        }
    }

    // Generar y descargar ficha
    async function downloadCharacterSheet() {
        const charName = document.getElementById("charName").value.trim() || "Sin nombre";
        // Obtener habilidades
        const skills = [];
        for (let i = 1; i <= 5; i++) {
            const input = document.getElementById(`skill_${i}`);
            skills.push(input ? input.value.trim() : "");
        }
        
        // Crear contenedor principal de la ficha (ancho fijo 700px para buena resolución)
        const sheetDiv = document.createElement("div");
        sheetDiv.style.width = "700px";
        sheetDiv.style.backgroundColor = "#fef7e0";
        sheetDiv.style.borderRadius = "1.5rem";
        sheetDiv.style.padding = "1.5rem";
        sheetDiv.style.fontFamily = "'Georgia', 'Times New Roman', serif";
        sheetDiv.style.boxShadow = "0 10px 25px rgba(0,0,0,0.2)";
        sheetDiv.style.border = "1px solid #d4af37";
        sheetDiv.style.display = "flex";
        sheetDiv.style.gap = "1.5rem";
        sheetDiv.style.flexWrap = "wrap";
        
        // Columna izquierda: imagen (tamaño original)
        const leftCol = document.createElement("div");
        leftCol.style.flex = "1";
        leftCol.style.minWidth = "200px";
        leftCol.style.display = "flex";
        leftCol.style.flexDirection = "column";
        leftCol.style.alignItems = "center";
        
        const imgContainer = document.createElement("div");
        imgContainer.style.width = "100%";
        imgContainer.style.borderRadius = "1rem";
        imgContainer.style.border = "3px solid #d4af37";
        imgContainer.style.overflow = "hidden";
        imgContainer.style.backgroundColor = "#e9d6a7";
        imgContainer.style.display = "flex";
        imgContainer.style.alignItems = "center";
        imgContainer.style.justifyContent = "center";
        
        if (selectedImageData) {
            const img = document.createElement("img");
            img.src = selectedImageData;
            img.style.width = "100%";
            img.style.height = "auto";
            img.style.display = "block";
            imgContainer.appendChild(img);
        } else {
            imgContainer.innerHTML = '<span style="font-size:3rem; padding: 2rem;">🧙</span>';
            imgContainer.style.padding = "1rem";
        }
        leftCol.appendChild(imgContainer);
        
        // Columna derecha: nombre, radar, atributos numéricos, habilidades
        const rightCol = document.createElement("div");
        rightCol.style.flex = "2";
        rightCol.style.minWidth = "280px";
        rightCol.style.display = "flex";
        rightCol.style.flexDirection = "column";
        rightCol.style.gap = "1rem";
        
        // Nombre
        const nameDiv = document.createElement("div");
        nameDiv.style.fontSize = "1.8rem";
        nameDiv.style.fontWeight = "bold";
        nameDiv.style.color = "#3b2a1f";
        nameDiv.style.textAlign = "center";
        nameDiv.style.borderBottom = "2px solid #d4af37";
        nameDiv.style.paddingBottom = "0.3rem";
        nameDiv.innerText = charName;
        
        // Radar (canvas más grande para que los emojis quepan)
        const radarContainer = document.createElement("div");
        radarContainer.style.display = "flex";
        radarContainer.style.justifyContent = "center";
        const canvas = document.createElement("canvas");
        canvas.width = 280;   // aumentado de 250 a 280
        canvas.height = 280;
        canvas.style.width = "280px";
        canvas.style.height = "280px";
        canvas.style.backgroundColor = "rgba(255,248,225,0.8)";
        canvas.style.borderRadius = "1rem";
        canvas.style.boxShadow = "0 2px 8px rgba(0,0,0,0.1)";
        const ctx = canvas.getContext("2d");
        
        // Preparar valores normalizados (0 a 1) según máximos
        const maxVals = { hp:80, dmg:8, armor:6, steps:8, fp:60, range:8 };
        const normalized = [
            currentValues.hp / maxVals.hp,
            currentValues.dmg / maxVals.dmg,
            currentValues.armor / maxVals.armor,
            currentValues.steps / maxVals.steps,
            currentValues.fp / maxVals.fp,
            currentValues.range / maxVals.range
        ];
        drawRadarChart(ctx, 280, 280, normalized);
        radarContainer.appendChild(canvas);
        
        // Atributos numéricos debajo del radar
        const statsContainer = document.createElement("div");
        statsContainer.style.display = "flex";
        statsContainer.style.flexWrap = "wrap";
        statsContainer.style.gap = "0.5rem";
        statsContainer.style.justifyContent = "center";
        statsContainer.style.marginTop = "0.5rem";
        
        attributes.forEach(attr => {
            const val = currentValues[attr.id];
            const statBox = document.createElement("div");
            statBox.style.backgroundColor = "rgba(0,0,0,0.05)";
            statBox.style.padding = "0.2rem 0.6rem";
            statBox.style.borderRadius = "2rem";
            statBox.style.display = "flex";
            statBox.style.alignItems = "center";
            statBox.style.gap = "0.3rem";
            statBox.style.border = "1px solid #d4af37";
            statBox.innerHTML = `<span style="font-weight:bold;">${attr.icon} ${attr.name}:</span> <span style="font-size:1.1rem; font-weight:800; color:#b45f1b;">${val}</span>`;
            statsContainer.appendChild(statBox);
        });
        
        // Habilidades
        const skillsDiv = document.createElement("div");
        skillsDiv.style.marginTop = "0.5rem";
        skillsDiv.style.borderTop = "1px solid #e0c8a0";
        skillsDiv.style.paddingTop = "0.8rem";
        const skillsTitle = document.createElement("div");
        skillsTitle.style.fontWeight = "bold";
        skillsTitle.style.marginBottom = "0.5rem";
        skillsTitle.style.color = "#7a5a3a";
        skillsTitle.innerText = "⚡ HABILIDADES ⚡";
        skillsDiv.appendChild(skillsTitle);
        
        const skillsList = document.createElement("ul");
        skillsList.style.listStyle = "none";
        skillsList.style.padding = "0";
        skillsList.style.margin = "0";
        skills.forEach((skill, idx) => {
            const li = document.createElement("li");
            li.style.marginBottom = "0.3rem";
            li.style.fontSize = "0.9rem";
            li.style.display = "flex";
            li.style.alignItems = "center";
            li.style.gap = "0.5rem";
            const numSpan = document.createElement("span");
            numSpan.style.backgroundColor = "#d4af37";
            numSpan.style.color = "#2c1e0e";
            numSpan.style.width = "22px";
            numSpan.style.height = "22px";
            numSpan.style.borderRadius = "50%";
            numSpan.style.display = "inline-flex";
            numSpan.style.alignItems = "center";
            numSpan.style.justifyContent = "center";
            numSpan.style.fontWeight = "bold";
            numSpan.innerText = (idx+1).toString();
            const textSpan = document.createElement("span");
            textSpan.innerText = skill || "—";
            li.appendChild(numSpan);
            li.appendChild(textSpan);
            skillsList.appendChild(li);
        });
        skillsDiv.appendChild(skillsList);
        
        rightCol.appendChild(nameDiv);
        rightCol.appendChild(radarContainer);
        rightCol.appendChild(statsContainer);
        rightCol.appendChild(skillsDiv);
        
        sheetDiv.appendChild(leftCol);
        sheetDiv.appendChild(rightCol);
        
        // Añadir al body temporal
        document.body.appendChild(sheetDiv);
        
        try {
            const canvasImg = await html2canvas(sheetDiv, {
                scale: 2.5,
                backgroundColor: "#fef7e0",
                logging: false,
                useCORS: true
            });
            const link = document.createElement("a");
            const safeName = charName.replace(/[^a-z0-9]/gi, "_");
            link.download = `ficha_${safeName}.png`;
            link.href = canvasImg.toDataURL("image/png");
            link.click();
        } catch (err) {
            console.error(err);
            alert("Error al generar la imagen.");
        } finally {
            document.body.removeChild(sheetDiv);
        }
    }
    
    // Construir la calculadora
    function buildCalculatorUI() {
        const container = document.getElementById("attributesContainer");
        container.innerHTML = "";
        attributes.forEach(attr => {
            const card = document.createElement("div");
            card.className = "attr-card";
            card.innerHTML = `
                <div class="attr-header">
                    <span class="attr-name">${attr.icon} ${attr.name}</span>
                    <span class="attr-limits">mín ${attr.minValue} · máx ${attr.maxValue}</span>
                </div>
                <div class="value-row">
                    <input type="range" class="slider" id="${attr.id}_slider" min="${attr.minValue}" max="${attr.maxValue}" step="1" value="1">
                    <div class="stat-value-calc" id="${attr.id}_value_display">1</div>
                    <div class="number-input"><input type="number" id="${attr.id}_num" min="${attr.minValue}" max="${attr.maxValue}" step="1" value="1"></div>
                </div>
                <div class="cost-info">
                    <span class="points-cost" id="${attr.id}_cost">${attr.minValue * attr.costPerUnit} pts</span>
                    <span>${attr.costPerUnit ===1 ? "1→1" : attr.costPerUnit===5 ? "5→+1" : "10→+1"}</span>
                </div>
            `;
            container.appendChild(card);
            const slider = document.getElementById(`${attr.id}_slider`);
            const num = document.getElementById(`${attr.id}_num`);
            slider.addEventListener("input", (e) => setAttributeValue(attr.id, parseInt(e.target.value)));
            num.addEventListener("change", (e) => setAttributeValue(attr.id, parseInt(e.target.value)));
        });
    }
    
    // Eventos
    document.getElementById("resetBtn").addEventListener("click", resetToMin);
    document.getElementById("randomBtn").addEventListener("click", randomDistribution);
    document.getElementById("magoBtn").addEventListener("click", () => applyRole("mago"));
    document.getElementById("luchadorBtn").addEventListener("click", () => applyRole("luchador"));
    document.getElementById("tanqueBtn").addEventListener("click", () => applyRole("tanque"));
    document.getElementById("asesinoBtn").addEventListener("click", () => applyRole("asesino"));
    document.getElementById("downloadBtn").addEventListener("click", downloadCharacterSheet);
    
    buildCalculatorUI();
    buildSkillsInputs();
    resetToMin();
</script>
</body>
</html>
