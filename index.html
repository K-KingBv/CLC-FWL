<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Calculadora de Atributos + Ficha descargable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,140,0.3);
        }

        h1 {
            font-size: clamp(1.5rem, 6vw, 2rem);
            text-align: center;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            text-align: center;
            color: #bcd0e0;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .points-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 2rem;
            padding: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .total-box, .remaining {
            background: #00000066;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            text-align: center;
        }
        .total-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #FFD966;
        }
        .warning {
            font-size: 0.7rem;
            background: #2c1e0e80;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            text-align: center;
        }
        .progress-container {
            background: #2c3e2e4d;
            border-radius: 2rem;
            height: 8px;
            margin-bottom: 1rem;
        }
        .progress-bar {
            background: linear-gradient(90deg, #f3b33d, #ffdd77);
            width: 0%;
            height: 100%;
            border-radius: 2rem;
        }
        .attributes-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .attr-card {
            background: rgba(15,25,35,0.85);
            border-radius: 1.5rem;
            padding: 0.7rem;
        }
        .attr-header {
            display: flex;
            justify-content: space-between;
        }
        .value-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.3rem 0;
        }
        .slider {
            flex: 2;
            min-width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: #2d3e4e;
            border-radius: 10px;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #ffb347;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px #ffae42;
            border: 2px solid white;
        }
        .stat-value-calc {
            background: #0f1a1f;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #f5bc70;
        }
        .number-input input {
            background: #09161e;
            border: 1px solid #ffb34788;
            color: #ffdd99;
            border-radius: 2rem;
            padding: 0.3rem 0.6rem;
            width: 65px;
            text-align: center;
        }
        button {
            background: #ffb347;
            border: none;
            font-weight: bold;
            padding: 0.6rem;
            border-radius: 3rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 #a05e15;
            transform: translateY(-2px);
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        .role-group, .button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .role-btn {
            background: #3a6ea5;
            box-shadow: 0 3px 0 #1e3a5f;
            color: white;
        }
        .download-btn {
            background: #2c6e2c;
            box-shadow: 0 3px 0 #1a451a;
            color: white;
            width: 100%;
            margin-top: 0.8rem;
            font-size: 1.1rem;
        }
        .char-info {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .input-group label {
            font-size: 0.8rem;
            color: #ffdfaa;
            font-weight: bold;
        }
        .input-group input {
            background: #0f1a1f;
            border: 1px solid #ffb34788;
            color: #ffdd99;
            border-radius: 1.5rem;
            padding: 0.5rem 1rem;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .file-label {
            background: #3a6ea5;
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            text-align: center;
            color: white;
            font-size: 0.8rem;
        }
        input[type="file"] {
            display: none;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            color: #6e8eae;
            margin-top: 1rem;
        }
        @media (max-width: 550px) {
            body { padding: 10px; }
            .container { padding: 1rem; }
            .value-row { flex-direction: column; align-items: stretch; }
            .slider { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚔️ FORJADOR DE HÉROES ⚔️</h1>
    <div class="sub">Distribuye 200 puntos (mínimo 1)</div>

    <div class="points-panel">
        <div class="total-box"><div class="total-label">PUNTOS TOTALES</div><div class="total-value" id="totalPointsDisplay">200</div></div>
        <div class="remaining"><div class="total-label">RESTANTES</div><div class="total-value" id="remainingPointsDisplay">200</div></div>
        <div class="warning" id="warningMsg">✨ Ajusta atributos</div>
    </div>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

    <div class="attributes-grid" id="attributesContainer"></div>

    <div class="button-group">
        <button id="resetBtn">♻️ MÍNIMOS (1)</button>
        <button id="randomBtn">🎲 ALEATORIO</button>
    </div>
    <div class="role-group">
        <button id="magoBtn" class="role-btn">🧙 MAGO</button>
        <button id="luchadorBtn" class="role-btn">⚔️ LUCHADOR</button>
        <button id="tanqueBtn" class="role-btn">🛡️ TANQUE</button>
        <button id="asesinoBtn" class="role-btn">🗡️ ASESINO</button>
    </div>

    <!-- Campos para la ficha: solo nombre e imagen -->
    <div class="char-info">
        <div class="input-group">
            <label>📝 Nombre del personaje</label>
            <input type="text" id="charName" placeholder="Ej: Thorgrim, Elara, etc." value="Aventurero">
        </div>
        <div class="input-group">
            <label>🖼️ Imagen del personaje (opcional, formato retrato)</label>
            <label class="file-label" for="charImageInput">Seleccionar imagen</label>
            <input type="file" id="charImageInput" accept="image/jpeg, image/png, image/webp">
            <span id="imagePreviewName" style="font-size:0.7rem; color:#bbaa77;">Ninguna imagen seleccionada</span>
        </div>
    </div>

    <button id="downloadBtn" class="download-btn">📸 DESCARGAR FICHA COMO IMAGEN</button>
    <footer>Vida (1:1) · Daño (5:1) · Armadura (10:1) · Pasos (10:1) · FP (1:1) · Alcance (10:1)</footer>
</div>

<script>
    // ---------- ATRIBUTOS Y LÓGICA ----------
    const attributes = [
        { id: "hp", name: "❤️ VIDA", maxValue: 80, costPerUnit: 1, minValue: 1 },
        { id: "dmg", name: "⚔️ DAÑO", maxValue: 8, costPerUnit: 5, minValue: 1 },
        { id: "armor", name: "🛡️ ARMADURA", maxValue: 6, costPerUnit: 10, minValue: 1 },
        { id: "steps", name: "👟 PASOS", maxValue: 8, costPerUnit: 10, minValue: 1 },
        { id: "fp", name: "✨ FP", maxValue: 60, costPerUnit: 1, minValue: 1 },
        { id: "range", name: "🏹 ALCANCE", maxValue: 8, costPerUnit: 10, minValue: 1 }
    ];

    let currentValues = {};
    attributes.forEach(attr => { currentValues[attr.id] = 1; });

    let selectedImageData = null;

    // Predefinir roles (solo para modificar atributos, no se muestran en la ficha)
    const roles = {
        mago: { hp:20, dmg:5, armor:1, steps:2, fp:55, range:7 },
        luchador: { hp:45, dmg:7, armor:4, steps:5, fp:10, range:2 },
        tanque: { hp:75, dmg:2, armor:6, steps:4, fp:5, range:1 },
        asesino: { hp:15, dmg:8, armor:1, steps:8, fp:5, range:5 }
    };

    function applyRole(roleKey) {
        const r = roles[roleKey];
        if (r) {
            attributes.forEach(attr => { currentValues[attr.id] = r[attr.id]; });
            updateAllUI();
        }
    }

    function resetToMin() {
        attributes.forEach(attr => { currentValues[attr.id] = attr.minValue; });
        updateAllUI();
    }

    function randomDistribution() {
        resetToMin();
        let remainingPoints = 200 - calculateTotalPoints();
        let attempts = 0;
        while (remainingPoints > 0 && attempts < 2000) {
            let shuffled = [...attributes];
            for (let i = shuffled.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
            let changed = false;
            for (let attr of shuffled) {
                if (currentValues[attr.id] < attr.maxValue && remainingPoints >= attr.costPerUnit) {
                    currentValues[attr.id]++;
                    remainingPoints -= attr.costPerUnit;
                    changed = true;
                    break;
                }
            }
            if (!changed) break;
            attempts++;
        }
        if (remainingPoints > 0) {
            const cheap = attributes.filter(a => a.costPerUnit === 1 && currentValues[a.id] < a.maxValue);
            for (let a of cheap) {
                while (remainingPoints >= 1 && currentValues[a.id] < a.maxValue) {
                    currentValues[a.id]++;
                    remainingPoints--;
                }
                if (remainingPoints === 0) break;
            }
        }
        updateAllUI();
    }

    function calculateTotalPoints() {
        return attributes.reduce((sum, attr) => sum + currentValues[attr.id] * attr.costPerUnit, 0);
    }

    function setAttributeValue(attrId, newRawValue) {
        const attr = attributes.find(a => a.id === attrId);
        if (!attr) return;
        if (newRawValue < attr.minValue) {
            showTemporaryWarning(`⚠️ El mínimo para ${attr.name} es ${attr.minValue}.`);
            syncInputs();
            return;
        }
        let clampedValue = Math.min(attr.maxValue, newRawValue);
        const oldValue = currentValues[attrId];
        const oldTotal = calculateTotalPoints();
        let newTotal = oldTotal - (oldValue * attr.costPerUnit) + (clampedValue * attr.costPerUnit);
        let finalValue = clampedValue;
        if (newTotal > 200) {
            const excess = newTotal - 200;
            const maxReduction = Math.ceil(excess / attr.costPerUnit);
            let possible = clampedValue - maxReduction;
            if (possible < attr.minValue) possible = attr.minValue;
            if (oldTotal - (oldValue * attr.costPerUnit) + (possible * attr.costPerUnit) <= 200) finalValue = possible;
            else {
                let best = attr.minValue;
                for (let v = attr.minValue; v <= clampedValue; v++) {
                    if (oldTotal - (oldValue * attr.costPerUnit) + (v * attr.costPerUnit) <= 200) best = v;
                    else break;
                }
                finalValue = best;
            }
        }
        if (currentValues[attrId] !== finalValue) {
            currentValues[attrId] = finalValue;
            updateAllUI();
        } else {
            updateAllUI();
        }
    }

    function syncInputs() {
        attributes.forEach(attr => {
            const val = currentValues[attr.id];
            const slider = document.getElementById(`${attr.id}_slider`);
            if (slider && slider.value != val) slider.value = val;
            const num = document.getElementById(`${attr.id}_num`);
            if (num && num.value != val) num.value = val;
            const span = document.getElementById(`${attr.id}_value_display`);
            if (span) span.innerText = val;
            const costSpan = document.getElementById(`${attr.id}_cost`);
            if (costSpan) costSpan.innerText = `${val * attr.costPerUnit} pts`;
        });
    }

    function showTemporaryWarning(msg) {
        const warn = document.getElementById("warningMsg");
        warn.innerHTML = msg;
        warn.style.color = "#ffaa88";
        setTimeout(() => {
            const total = calculateTotalPoints();
            if (total === 200) warn.innerHTML = "✅ ¡PUNTOS JUSTOS!";
            else warn.innerHTML = `📌 Te quedan ${200 - total} puntos.`;
            warn.style.color = "#f1c40f";
        }, 2000);
    }

    function updateAllUI() {
        const total = calculateTotalPoints();
        const remaining = 200 - total;
        document.getElementById("totalPointsDisplay").innerText = total;
        document.getElementById("remainingPointsDisplay").innerText = remaining;
        document.getElementById("progressBar").style.width = `${Math.min(100, (total/200)*100)}%`;
        const warn = document.getElementById("warningMsg");
        if (total === 200) warn.innerHTML = "✅ ¡PUNTOS JUSTOS!";
        else warn.innerHTML = `📌 Te quedan ${remaining} puntos.`;
        syncInputs();
    }

    // Imagen
    const imageInput = document.getElementById("charImageInput");
    imageInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                selectedImageData = ev.target.result;
                document.getElementById("imagePreviewName").innerText = "✅ Imagen cargada";
            };
            reader.readAsDataURL(file);
        } else {
            selectedImageData = null;
            document.getElementById("imagePreviewName").innerText = "Ninguna imagen seleccionada";
        }
    });

    // Generar y descargar ficha (sin rol, y sin duplicar emojis)
    async function downloadCharacterSheet() {
        const charName = document.getElementById("charName").value.trim() || "Sin nombre";

        const sheetDiv = document.createElement("div");
        sheetDiv.style.position = "absolute";
        sheetDiv.style.top = "-9999px";
        sheetDiv.style.left = "-9999px";
        sheetDiv.style.width = "600px";
        sheetDiv.style.backgroundColor = "#fef7e0";
        sheetDiv.style.borderRadius = "2rem";
        sheetDiv.style.padding = "1.5rem";
        sheetDiv.style.fontFamily = "'Georgia', 'Times New Roman', serif";
        sheetDiv.style.boxShadow = "0 20px 30px rgba(0,0,0,0.3)";
        sheetDiv.style.border = "2px solid #d4af37";
        sheetDiv.style.backgroundImage = "radial-gradient(circle at 10% 20%, rgba(210,180,140,0.2) 2%, transparent 2.5%)";
        sheetDiv.style.backgroundSize = "25px 25px";

        // Cabecera con imagen y nombre (sin rol)
        const header = document.createElement("div");
        header.style.display = "flex";
        header.style.alignItems = "center";
        header.style.gap = "1.5rem";
        header.style.marginBottom = "1.5rem";
        header.style.borderBottom = "2px solid #c2a144";
        header.style.paddingBottom = "1rem";
        header.style.flexWrap = "wrap";

        const imgContainer = document.createElement("div");
        imgContainer.style.width = "140px";
        imgContainer.style.height = "180px";
        imgContainer.style.borderRadius = "20px";
        imgContainer.style.backgroundColor = "#e9d6a7";
        imgContainer.style.border = "3px solid #d4af37";
        imgContainer.style.display = "flex";
        imgContainer.style.alignItems = "center";
        imgContainer.style.justifyContent = "center";
        imgContainer.style.overflow = "hidden";
        imgContainer.style.flexShrink = "0";

        if (selectedImageData) {
            const img = document.createElement("img");
            img.src = selectedImageData;
            img.style.width = "100%";
            img.style.height = "100%";
            img.style.objectFit = "cover";
            imgContainer.appendChild(img);
        } else {
            imgContainer.innerHTML = '<span style="font-size:3rem;">🧙</span>';
        }

        const nameDiv = document.createElement("div");
        nameDiv.style.flex = "1";
        nameDiv.innerHTML = `<div style="font-size:1.8rem; font-weight:bold; color:#3b2a1f;">${escapeHtml(charName)}</div>`;

        header.appendChild(imgContainer);
        header.appendChild(nameDiv);

        // Atributos: mostramos solo el nombre del atributo SIN duplicar el emoji.
        // Usaremos el nombre limpio (quitamos el emoji del principio si existe) o mejor: definimos un texto sin emoji.
        // Para mantener la coherencia, mostraremos por ejemplo "VIDA" en lugar de "❤️ VIDA". Pero el usuario quiere el emoji una sola vez.
        // Como el nombre del atributo ya incluye el emoji (ej: "❤️ VIDA"), lo mostraremos tal cual, sin añadir otro icono.
        // Pero antes se duplicaba porque se añadía attr.icon + displayName. Ahora solo mostraremos attr.name (que ya tiene el emoji).
        const statsContainer = document.createElement("div");
        statsContainer.style.display = "flex";
        statsContainer.style.flexDirection = "column";
        statsContainer.style.gap = "0.6rem";
        statsContainer.style.margin = "1rem 0";

        attributes.forEach(attr => {
            const val = currentValues[attr.id];
            const row = document.createElement("div");
            row.style.display = "flex";
            row.style.justifyContent = "space-between";
            row.style.backgroundColor = "rgba(0,0,0,0.05)";
            row.style.padding = "0.4rem 0.8rem";
            row.style.borderRadius = "40px";
            row.style.borderLeft = "5px solid #d4af37";
            // Usamos attr.name que ya contiene el emoji (ej: "❤️ VIDA") sin duplicar
            row.innerHTML = `
                <div style="font-weight:bold;">${attr.name}</div>
                <div style="font-size:1.3rem; font-weight:800; color:#b45f1b; background:#fff0cf; padding:0 10px; border-radius:30px;">${val}</div>
            `;
            statsContainer.appendChild(row);
        });

        const footerDiv = document.createElement("div");
        footerDiv.style.textAlign = "center";
        footerDiv.style.marginTop = "1rem";
        footerDiv.style.fontSize = "0.7rem";
        footerDiv.style.color = "#8b6946";
        footerDiv.style.borderTop = "1px dashed #c2a144";
        footerDiv.style.paddingTop = "0.5rem";
        footerDiv.innerHTML = `<span style="background:#2c1e0e; color:#ffdfaa; padding:0.2rem 0.8rem; border-radius:20px;">⚔️🛡️✨</span>`;

        sheetDiv.appendChild(header);
        sheetDiv.appendChild(statsContainer);
        sheetDiv.appendChild(footerDiv);

        document.body.appendChild(sheetDiv);

        try {
            const canvas = await html2canvas(sheetDiv, {
                scale: 2.5,
                backgroundColor: "#fef7e0",
                logging: false,
                useCORS: true
            });
            const link = document.createElement("a");
            const safeName = charName.replace(/[^a-z0-9]/gi, "_");
            link.download = `ficha_${safeName}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        } catch (err) {
            console.error(err);
            alert("Error al generar la imagen. Intenta de nuevo.");
        } finally {
            document.body.removeChild(sheetDiv);
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Construir la calculadora
    function buildCalculatorUI() {
        const container = document.getElementById("attributesContainer");
        container.innerHTML = "";
        attributes.forEach(attr => {
            const card = document.createElement("div");
            card.className = "attr-card";
            card.innerHTML = `
                <div class="attr-header">
                    <span class="attr-name">${attr.name}</span>
                    <span class="attr-limits">mín ${attr.minValue} · máx ${attr.maxValue}</span>
                </div>
                <div class="value-row">
                    <input type="range" class="slider" id="${attr.id}_slider" min="${attr.minValue}" max="${attr.maxValue}" step="1" value="1">
                    <div class="stat-value-calc" id="${attr.id}_value_display">1</div>
                    <div class="number-input"><input type="number" id="${attr.id}_num" min="${attr.minValue}" max="${attr.maxValue}" step="1" value="1"></div>
                </div>
                <div class="cost-info" style="display:flex; justify-content:space-between; margin-top:5px;">
                    <span class="points-cost" id="${attr.id}_cost">${attr.minValue * attr.costPerUnit} pts</span>
                    <span>${attr.costPerUnit ===1 ? "1→1" : attr.costPerUnit===5 ? "5→+1" : "10→+1"}</span>
                </div>
            `;
            container.appendChild(card);
            const slider = document.getElementById(`${attr.id}_slider`);
            const num = document.getElementById(`${attr.id}_num`);
            slider.addEventListener("input", (e) => setAttributeValue(attr.id, parseInt(e.target.value)));
            num.addEventListener("change", (e) => setAttributeValue(attr.id, parseInt(e.target.value)));
        });
    }

    // Eventos
    document.getElementById("resetBtn").addEventListener("click", resetToMin);
    document.getElementById("randomBtn").addEventListener("click", randomDistribution);
    document.getElementById("magoBtn").addEventListener("click", () => applyRole("mago"));
    document.getElementById("luchadorBtn").addEventListener("click", () => applyRole("luchador"));
    document.getElementById("tanqueBtn").addEventListener("click", () => applyRole("tanque"));
    document.getElementById("asesinoBtn").addEventListener("click", () => applyRole("asesino"));
    document.getElementById("downloadBtn").addEventListener("click", downloadCharacterSheet);

    buildCalculatorUI();
    resetToMin();
</script>
</body>
</html>
