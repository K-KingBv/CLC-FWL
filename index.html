<body>
<div class="calculator">
    <h1>⚔️ FORJADOR DE HÉROES ⚔️</h1>
    <div style="text-align: center"><span class="sub">Distribuye 200 puntos de atributo</span></div>

    <div class="points-panel">
        <div class="total-box">
            <div class="total-label">PUNTOS TOTALES</div>
            <div class="total-value" id="totalPointsDisplay">200</div>
        </div>
        <div class="remaining">
            <div class="total-label">PUNTOS RESTANTES</div>
            <div class="total-value" id="remainingPointsDisplay">200</div>
        </div>
        <div class="warning" id="warningMsg">✨ Ajusta los atributos</div>
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
    </div>

    <div class="attributes-grid" id="attributesContainer"></div>

    <button id="resetBtn">♻️ REINICIAR ATRIBUTOS (0 puntos)</button>
    <footer>Vida (1:1) · Daño (5:1) · Armadura (10:1) · Pasos (10:1) · FP (1:1) · Alcance (10:1)</footer>
</div>

<script>
    // Definición de atributos
    const attributes = [
        { id: "hp", name: "❤️ VIDA", maxValue: 80, costPerUnit: 1, baseUnit: 1, initial: 0 },
        { id: "dmg", name: "⚔️ DAÑO", maxValue: 8, costPerUnit: 5, baseUnit: 0.2, initial: 0 },
        { id: "armor", name: "🛡️ ARMADURA", maxValue: 6, costPerUnit: 10, baseUnit: 0.1, initial: 0 },
        { id: "steps", name: "👟 PASOS", maxValue: 8, costPerUnit: 10, baseUnit: 0.1, initial: 0 },
        { id: "fp", name: "✨ FP", maxValue: 60, costPerUnit: 1, baseUnit: 1, initial: 0 },
        { id: "range", name: "🏹 ALCANCE", maxValue: 8, costPerUnit: 10, baseUnit: 0.1, initial: 0 }
    ];

    // Estado actual de cada estadística (valor numérico, ej: Vida = 0..80)
    let currentValues = {};

    // Inicializar valores a 0
    attributes.forEach(attr => {
        currentValues[attr.id] = 0;
    });

    // Función para calcular puntos gastados según valores actuales
    function calculateTotalPoints() {
        let total = 0;
        attributes.forEach(attr => {
            const value = currentValues[attr.id];
            total += value * attr.costPerUnit;
        });
        return total;
    }

    // Actualiza toda la UI: puntos restantes, barra, mensajes, y también ajusta sliders/inputs si es necesario
    function updateUI() {
        const totalPoints = calculateTotalPoints();
        const remaining = 200 - totalPoints;
        document.getElementById("totalPointsDisplay").innerText = totalPoints;
        document.getElementById("remainingPointsDisplay").innerText = remaining;
        const percent = Math.min(100, (totalPoints / 200) * 100);
        document.getElementById("progressBar").style.width = `${percent}%`;

        const warningDiv = document.getElementById("warningMsg");
        if (totalPoints > 200) {
            warningDiv.innerHTML = "⚠️ ¡Has excedido los 200 puntos! Reduce algún atributo. ⚠️";
            warningDiv.style.color = "#ffaa88";
            warningDiv.style.fontWeight = "bold";
            warningDiv.style.background = "#4a1a1aaa";
        } else if (totalPoints === 200) {
            warningDiv.innerHTML = "✅ ¡PUNTOS JUSTOS! Héroe listo para la aventura ✅";
            warningDiv.style.color = "#b9ffb9";
            warningDiv.style.background = "#2e5c2e80";
        } else {
            warningDiv.innerHTML = `📌 Te quedan ${remaining} puntos para distribuir.`;
            warningDiv.style.color = "#f1c40f";
            warningDiv.style.background = "#2c1e0e80";
        }

        // Actualizar cada tarjeta: mostrar valor actual, puntos gastados de ese atributo, y límites
        attributes.forEach(attr => {
            const val = currentValues[attr.id];
            const spent = val * attr.costPerUnit;
            // elementos HTML
            const valueSpan = document.getElementById(`${attr.id}_value`);
            if (valueSpan) valueSpan.innerText = val;
            const costSpan = document.getElementById(`${attr.id}_cost`);
            if (costSpan) costSpan.innerText = spent;
            const slider = document.getElementById(`${attr.id}_slider`);
            if (slider && slider.value != val) slider.value = val;
            const numberInput = document.getElementById(`${attr.id}_num`);
            if (numberInput && numberInput.value != val) numberInput.value = val;
            // Adicional: si el valor supera el máximo por algún error, lo corregimos
            if (val > attr.maxValue) {
                currentValues[attr.id] = attr.maxValue;
                updateUI(); // recursión controlada, pero no generará bucle porque se reasigna al max y volverá a llamar. Mejor prevenir:
                // Para evitar loops, mejor corregir y luego refrescar una sola vez usando petición de actualización diferida
            }
        });

        // Habilitar/deshabilitar visualmente si hay exceso, pero dejamos que los sliders manejen restricciones en tiempo real
        const anyOver = (calculateTotalPoints() > 200);
        // solo efecto visual en los botones? no es necesario bloquear sliders porque el evento onChange ya limitará.
    }

    // Función robusta para cambiar un atributo a un nuevo valor respetando límite de puntos (200)
    function setAttributeValue(attrId, newRawValue) {
        const attr = attributes.find(a => a.id === attrId);
        if (!attr) return;

        // asegurar que el valor esté dentro del rango 0..maxValue
        let clampedValue = Math.min(attr.maxValue, Math.max(0, newRawValue));
        // Obtener puntos actuales sin modificar aún
        const oldValue = currentValues[attrId];
        const oldTotal = calculateTotalPoints();
        const newTotalWithoutAdjust = oldTotal - (oldValue * attr.costPerUnit) + (clampedValue * attr.costPerUnit);
        
        let finalValue = clampedValue;
        // Si supera el límite de 200 puntos, calcular el máximo valor posible sin pasarse
        if (newTotalWithoutAdjust > 200) {
            // Determinar cuántos puntos extra se exceden
            const excess = newTotalWithoutAdjust - 200;
            // Cuántas unidades podemos reducir máximo? Reducir este atributo (pero no por debajo de 0)
            const maxReductionInUnits = Math.ceil(excess / attr.costPerUnit);
            let possibleValue = clampedValue - maxReductionInUnits;
            if (possibleValue < 0) possibleValue = 0;
            // Recalcular con el valor ajustado
            const adjustedTotal = oldTotal - (oldValue * attr.costPerUnit) + (possibleValue * attr.costPerUnit);
            if (adjustedTotal <= 200) {
                finalValue = possibleValue;
            } else {
                // fallback: buscar valor máximo que no exceda
                let best = 0;
                for (let v = 0; v <= clampedValue; v++) {
                    const testTotal = oldTotal - (oldValue * attr.costPerUnit) + (v * attr.costPerUnit);
                    if (testTotal <= 200 && v <= attr.maxValue) best = v;
                    else break;
                }
                finalValue = best;
            }
        }
        
        // Actualizar y refrescar
        if (currentValues[attrId] !== finalValue) {
            currentValues[attrId] = finalValue;
            updateUI();
        } else if (newRawValue !== finalValue && newRawValue !== currentValues[attrId]) {
            // si se intentó poner un valor pero fue limitado, igual actualizar UI
            updateUI();
        } else {
            updateUI();
        }
    }

    // Crear la interfaz de cada atributo dinámicamente
    function buildAttributesUI() {
        const container = document.getElementById("attributesContainer");
        container.innerHTML = "";
        attributes.forEach(attr => {
            const card = document.createElement("div");
            card.className = "attr-card";

            // Header con nombre y límite
            const header = document.createElement("div");
            header.className = "attr-header";
            header.innerHTML = `
                <span class="attr-name">${attr.name}</span>
                <span class="attr-limits">máx ${attr.maxValue}</span>
            `;

            // Fila de slider y valor numérico
            const valueRow = document.createElement("div");
            valueRow.className = "value-row";

            const slider = document.createElement("input");
            slider.type = "range";
            slider.className = "slider";
            slider.id = `${attr.id}_slider`;
            slider.min = 0;
            slider.max = attr.maxValue;
            slider.step = 1;
            slider.value = currentValues[attr.id];

            const statSpan = document.createElement("div");
            statSpan.className = "stat-value";
            statSpan.id = `${attr.id}_value`;
            statSpan.innerText = currentValues[attr.id];

            const numberWrapper = document.createElement("div");
            numberWrapper.className = "number-input";
            const numberInput = document.createElement("input");
            numberInput.type = "number";
            numberInput.id = `${attr.id}_num`;
            numberInput.min = 0;
            numberInput.max = attr.maxValue;
            numberInput.step = 1;
            numberInput.value = currentValues[attr.id];
            numberInput.style.width = "70px";
            
            numberWrapper.appendChild(numberInput);
            valueRow.appendChild(slider);
            valueRow.appendChild(statSpan);
            valueRow.appendChild(numberWrapper);

            // Info de costo en puntos
            const costInfo = document.createElement("div");
            costInfo.className = "cost-info";
            const costSpan = document.createElement("span");
            costSpan.className = "points-cost";
            costSpan.id = `${attr.id}_cost`;
            const currentCost = currentValues[attr.id] * attr.costPerUnit;
            costSpan.innerText = `${currentCost} pts`;
            const conversionText = document.createElement("span");
            conversionText.className = "max-warning";
            // Mostrar tasa de conversión
            if (attr.costPerUnit === 1) conversionText.innerText = `1 punto → 1 ${attr.id === "hp" ? "Vida" : "FP"}`;
            else if (attr.costPerUnit === 5) conversionText.innerText = `5 puntos → +1 Daño`;
            else conversionText.innerText = `10 puntos → +1 ${attr.name.replace(/[^A-Za-záéíóú]/g, '')}`;
            
            costInfo.appendChild(costSpan);
            costInfo.appendChild(conversionText);

            card.appendChild(header);
            card.appendChild(valueRow);
            card.appendChild(costInfo);
            container.appendChild(card);

            // Eventos
            slider.addEventListener("input", (e) => {
                let newVal = parseInt(e.target.value, 10);
                if (isNaN(newVal)) newVal = 0;
                setAttributeValue(attr.id, newVal);
            });

            numberInput.addEventListener("change", (e) => {
                let newVal = parseInt(e.target.value, 10);
                if (isNaN(newVal)) newVal = 0;
                setAttributeValue(attr.id, newVal);
            });
        });
    }

    // Reset completo a 0
    function resetAttributes() {
        attributes.forEach(attr => {
            currentValues[attr.id] = 0;
        });
        updateUI();
        // además sincronizar valores en los inputs
        attributes.forEach(attr => {
            const slider = document.getElementById(`${attr.id}_slider`);
            if (slider) slider.value = 0;
            const numInput = document.getElementById(`${attr.id}_num`);
            if (numInput) numInput.value = 0;
            const valSpan = document.getElementById(`${attr.id}_value`);
            if (valSpan) valSpan.innerText = 0;
            const costSpan = document.getElementById(`${attr.id}_cost`);
            if (costSpan) costSpan.innerText = "0 pts";
        });
    }

    // Inicializar todo, construir UI y actualizar
    function init() {
        buildAttributesUI();
        updateUI();
        document.getElementById("resetBtn").addEventListener("click", () => {
            resetAttributes();
        });
    }

    init();
</script>
</body>
</html>
